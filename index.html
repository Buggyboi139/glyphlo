<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glyphlo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0d 0%, #16161d 100%);
      color: #e0e0e0;
      overflow: hidden;
      touch-action: none;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .screen.active {
      display: flex;
    }

    .title {
      font-size: 3.5rem;
      font-weight: 900;
      color: #3498db;
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
      text-align: center;
    }

    .instructions {
      font-size: 1rem;
      color: #888;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 50px;
      letter-spacing: 0.5px;
    }

    .btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .level-grid {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 320px;
      gap: 12px;
    }

    .level-btn {
      background: #111116;
      color: #fff;
      border: 1px solid #222;
      padding: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .level-btn.unlocked {
      border-color: #3498db;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.1);
    }

    .level-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .header-titles {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .level-text {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      margin: 0;
    }

    .flavor-text {
      font-size: 0.9rem;
      color: #666;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .hint-btn {
      background: none;
      border: none;
      color: #f1c40f;
      font-size: 1.8rem;
      cursor: pointer;
      width: 40px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #444;
      font-size: 1.8rem;
      cursor: pointer;
      width: 40px;
    }

    .guess-display {
      font-size: clamp(2.5rem, 10vw, 3rem);
      font-weight: bold;
      letter-spacing: 10px;
      color: #3498db;
      height: 70px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
    }

    .game-board {
      position: relative;
      width: 88vw;
      max-width: 380px;
      height: 88vw;
      max-height: 380px;
      background: #0d0d12;
      border-radius: 50%;
      box-shadow: 0 20px 60px rgba(0,0,0,1);
      border: 1px solid #1a1a22;
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-origin: center center;
    }

    #puzzleContainer.solved {
      animation: spinFade 1s ease-in-out forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.3); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .dot {
      position: absolute;
      width: clamp(48px, 14vw, 58px);
      height: clamp(48px, 14vw, 58px);
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(52, 152, 219, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      z-index: 2;
      touch-action: none;
    }

    .dot.selected {
      background-color: #e67e22;
      box-shadow: 0 0 25px rgba(230, 126, 34, 0.8);
      transform: scale(1.1);
    }

    .dot.locked {
      background-color: #1a1a24;
      border: 3px solid #f1c40f;
      color: #f1c40f;
      box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
    }
  </style>
</head>
<body>

  <div id="screen-intro" class="screen active">
    <h1 class="title">GLYPHLO</h1>
    <p class="instructions">Decipher the words by swapping nodes. Read the pattern clockwise from the top.</p>
    <button class="btn" onclick="showScreen('screen-select')">Start</button>
  </div>

  <div id="screen-select" class="screen">
    <h1 class="title">LEVELS</h1>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <div id="screen-game" class="screen">
    <div class="game-header">
      <button class="back-btn" onclick="showScreen('screen-select')">←</button>
      <div class="header-titles">
        <h1 class="level-text" id="levelDisplay">STAGE 1</h1>
        <p class="flavor-text" id="flavorDisplay">3 LETTERS</p>
      </div>
      <button class="hint-btn" id="hintBtn" onclick="useHint()">💡</button>
    </div>
    <div class="guess-display" id="guessDisplay"></div> 
    <div class="game-board" id="gameBoard">
      <div id="puzzleContainer">
        <svg id="wireLayer"></svg>
        <div id="orbLayer"></div>
      </div>
    </div>
  </div>

  <script>
    let currentStage = 1;
    let currentDifficulty = 3;
    const maxStages = 5;
    let targetWord = "";
    let currentLetters = [];
    let lockedOrbs = [];
    let orbs = [], orbPositions = [];
    let selectedIndex = null, isAnimating = false;
    let activeDragIndex = null, isDragging = false;
    let startPointerX = 0, startPointerY = 0, currentTranslateX = 0, currentTranslateY = 0;

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const hintBtn = document.getElementById('hintBtn');
    const gameBoard = document.getElementById('gameBoard');

    function getUnlocked() { return parseInt(localStorage.getItem('glyphloUnlocked')) || 3; }
    function setUnlocked(lvl) { localStorage.setItem('glyphloUnlocked', lvl); }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'screen-select') buildLevels();
    }

    function buildLevels() {
      const grid = document.getElementById('levelGrid'), unlocked = getUnlocked();
      grid.innerHTML = '';
      for (let i = 3; i <= 7; i++) {
        const btn = document.createElement('button');
        btn.className = `level-btn ${i <= unlocked ? 'unlocked' : ''}`;
        btn.innerHTML = `<span>${i} LETTERS</span> <span>${i <= unlocked ? '▶' : '🔒'}</span>`;
        btn.disabled = i > unlocked;
        btn.onclick = () => { currentDifficulty = i; currentStage = 1; showScreen('screen-game'); startLevel(); };
        grid.appendChild(btn);
      }
    }

    async function fetchWord(len) {
      try {
        const r = await fetch(`https://random-word-api.herokuapp.com/word?length=${len}`);
        const d = await r.json();
        return d[0].toUpperCase();
      } catch (e) {
        return {3:"SUN",4:"FLOW",5:"GLYPH",6:"ORBITAL",7:"DYNAMIC"}[len];
      }
    }

    async function startLevel() {
      isAnimating = false; selectedIndex = null; activeDragIndex = null;
      orbLayer.innerHTML = ''; wireLayer.innerHTML = ''; hintBtn.disabled = false;
      levelDisplay.textContent = `STAGE ${currentStage}`;
      flavorDisplay.textContent = `${currentDifficulty} LETTERS`;
      guessDisplay.textContent = "LOADING...";
      
      targetWord = await fetchWord(currentDifficulty);
      lockedOrbs = new Array(targetWord.length).fill(false);
      
      let scrambled;
      do { scrambled = targetWord.split('').sort(() => 0.5 - Math.random()); } while (scrambled.join('') === targetWord);
      currentLetters = scrambled;

      const size = gameBoard.clientWidth, radius = size * 0.35, cx = size / 2, cy = size / 2;
      const dotSize = Math.max(48, size * 0.14);
      const n = targetWord.length;
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      orbPositions = []; orbs = [];

      for (let i = 0; i < n; i++) {
        const a = (i * 2 * Math.PI) / n - (Math.PI / 2);
        const px = cx + radius * Math.cos(a), py = cy + radius * Math.sin(a);
        orbPositions.push({ cx: px, cy: py });
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = `${px - dotSize / 2}px`; dot.style.top = `${py - dotSize / 2}px`;
        setupInteraction(dot, i);
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }
      poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', '#3498db'); poly.setAttribute('stroke-width', '4');
      wireLayer.appendChild(poly);
      updateWires(); render();
    }

    function useHint() {
      if (isAnimating) return;
      let targetIdx = -1;
      for (let i = 0; i < targetWord.length; i++) { if (!lockedOrbs[i] && currentLetters[i] !== targetWord[i]) { targetIdx = i; break; } }
      if (targetIdx === -1) return;
      const needed = targetWord[targetIdx];
      let srcIdx = -1;
      for (let i = 0; i < currentLetters.length; i++) { if (!lockedOrbs[i] && currentLetters[i] === needed && i !== targetIdx) { srcIdx = i; break; } }
      if (srcIdx !== -1) [currentLetters[targetIdx], currentLetters[srcIdx]] = [currentLetters[srcIdx], currentLetters[targetIdx]];
      lockedOrbs[targetIdx] = true; selectedIndex = null; render(); checkWin();
    }

    function updateWires(di = -1, dx = 0, dy = 0) {
      let pts = "";
      orbPositions.forEach((p, i) => { pts += `${i === di ? p.cx + dx : p.cx},${i === di ? p.cy + dy : p.cy} `; });
      wireLayer.querySelector('polygon').setAttribute('points', pts.trim());
    }

    function setupInteraction(dot, i) {
      dot.addEventListener('pointerdown', e => {
        if (isAnimating || lockedOrbs[i]) return;
        activeDragIndex = i; isDragging = false;
        startPointerX = e.clientX; startPointerY = e.clientY;
        dot.style.transition = 'none'; dot.style.zIndex = 100;
        dot.setPointerCapture(e.pointerId);
      });
      dot.addEventListener('pointermove', e => {
        if (activeDragIndex !== i) return;
        const dx = e.clientX - startPointerX, dy = e.clientY - startPointerY;
        if (!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) { isDragging = true; selectedIndex = null; render(); }
        if (isDragging) { dot.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`; currentTranslateX = dx; currentTranslateY = dy; updateWires(i, dx, dy); }
      });
      dot.addEventListener('pointerup', e => {
        if (activeDragIndex !== i) return;
        dot.releasePointerCapture(e.pointerId); activeDragIndex = null;
        dot.style.transition = 'all 0.2s'; dot.style.transform = ''; dot.style.zIndex = 2;
        if (!isDragging) handleTap(i); else handleDrop(i, currentTranslateX, currentTranslateY);
        updateWires(); isDragging = false;
      });
    }

    function handleTap(idx) {
      if (lockedOrbs[idx]) return;
      if (selectedIndex === null) selectedIndex = idx;
      else if (selectedIndex === idx) selectedIndex = null;
      else { [currentLetters[selectedIndex], currentLetters[idx]] = [currentLetters[idx], currentLetters[selectedIndex]]; selectedIndex = null; checkWin(); }
      render();
    }

    function handleDrop(di, dx, dy) {
      const dropX = orbPositions[di].cx + dx, dropY = orbPositions[di].cy + dy;
      let closest = -1, min = 50;
      orbPositions.forEach((p, i) => { if (i !== di && !lockedOrbs[i]) { const d = Math.hypot(dropX - p.cx, dropY - p.cy); if (d < min) { min = d; closest = i; } } });
      if (closest !== -1) { [currentLetters[di], currentLetters[closest]] = [currentLetters[closest], currentLetters[di]]; checkWin(); }
      render();
    }

    function render() {
      orbs.forEach((d, i) => { d.textContent = currentLetters[i]; d.className = `dot ${lockedOrbs[i] ? 'locked' : ''} ${i === selectedIndex ? 'selected' : ''}`; });
      guessDisplay.textContent = currentLetters.join('');
    }

    function checkWin() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        guessDisplay.style.color = "#2ecc71";
        wireLayer.querySelector('polygon').setAttribute('stroke', '#2ecc71');
        orbs.forEach(d => { d.style.backgroundColor = "#2ecc71"; d.style.boxShadow = "0 0 25px #2ecc71"; d.style.border = "none"; d.style.color = "#fff"; });
        setTimeout(() => {
          puzzleContainer.classList.add('solved');
          setTimeout(() => {
            puzzleContainer.classList.remove('solved');
            guessDisplay.style.color = "#3498db";
            if (currentStage < maxStages) { currentStage++; startLevel(); }
            else { if (currentDifficulty >= getUnlocked()) setUnlocked(currentDifficulty + 1); showScreen('screen-select'); }
          }, 1200);
        }, 1000);
      }
    }

    buildLevels();
  </script>
</body>
</html>
