<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glyphlo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#08080c">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #08080c;
      --surface: #12131c;
      --surface-hover: #1a1c29;
      --text-main: #ffffff;
      --text-muted: #8b92a5;
      --pastel-grad: linear-gradient(135deg, #ff7eb3 0%, #8b44fc 50%, #00d2ff 100%);
      --daily-grad: linear-gradient(135deg, #00ff87 0%, #60efff 100%); /* New Cyber Green/Cyan */
      --gray-grad: linear-gradient(135deg, #a0a5b5 0%, #4a5065 100%);
      --success: #00f2fe;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    .top-banner {
      width: 100%;
      background: rgba(8, 8, 12, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px 0;
      text-align: center;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .banner-title {
      margin: 0;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: var(--pastel-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .banner-logo {
      height: clamp(1.8rem, 6vw, 2.5rem);
      width: auto;
      filter: drop-shadow(0 2px 5px rgba(0, 210, 255, 0.4));
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 20px 20px;
      box-sizing: border-box;
    }

    .screen.active {
      display: flex;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 30px;
    }

    .logo-g {
      fill: none;
      stroke: url(#lineGrad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-orb {
      fill: #00d2ff;
      filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.5));
    }

    .instructions {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--text-muted);
      text-align: center;
      max-width: 340px;
      line-height: 1.7;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .btn {
      background: var(--pastel-grad);
      color: white;
      border: none;
      padding: 16px 45px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 25px rgba(139, 68, 252, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4);
    }

    /* Updated Daily Challenge Button Styles */
    .btn-daily {
      background: var(--daily-grad);
      color: #08080c; /* Dark text on bright neon background */
      box-shadow: 0 10px 25px rgba(0, 255, 135, 0.25);
      width: 100%;
      max-width: 320px;
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }
    
    .btn-daily:hover {
      box-shadow: 0 15px 35px rgba(96, 239, 255, 0.4);
    }

    .level-grid {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 320px;
      gap: 15px;
    }

    .level-btn {
      background: var(--surface);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 20px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .level-btn.unlocked {
      background: linear-gradient(var(--surface), var(--surface)) padding-box, var(--pastel-grad) border-box;
      border: 1px solid transparent;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .level-btn:not(:disabled):hover {
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .level-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-bottom: 30px;
      position: relative;
    }

    .header-titles {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .level-text {
      font-size: clamp(1.8rem, 6vw, 2.2rem);
      font-weight: 800;
      color: var(--text-main);
      margin: 0;
      letter-spacing: 2px;
    }

    .flavor-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Updated Timer Badge styling */
    .timer-display {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: #00ff87;
      background: rgba(0, 255, 135, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(0, 255, 135, 0.3);
      display: none;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .hint-btn {
      background: none;
      border: none;
      color: #00d2ff;
      font-size: 1.5rem;
      cursor: pointer;
      width: 40px;
      transition: transform 0.2s, opacity 0.2s;
    }

    .hint-btn:disabled {
      color: #333;
      opacity: 0.5;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      width: 40px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--text-main);
    }

    .guess-display {
      font-size: clamp(2.5rem, 10vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 12px;
      background: var(--pastel-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      height: 70px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-board {
      position: relative;
      width: 85vw;
      max-width: 360px;
      height: 85vw;
      max-height: 360px;
      background: var(--surface);
      border-radius: 50%;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.5);
    }

    .center-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(60px, 20vw, 100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 0 15px rgba(139, 68, 252, 0.6));
    }

    .game-board::after {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(from 0deg, transparent 60%, #ff7eb3, #8b44fc, #00d2ff) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: spinFrame 4s linear infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes spinFrame {
      100% { transform: rotate(360deg); }
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      z-index: 2;
    }

    #puzzleContainer.solved {
      animation: spinFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(180deg) scale(0.8); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .dot {
      position: absolute;
      width: clamp(50px, 15vw, 60px);
      height: clamp(50px, 15vw, 60px);
      background: var(--pastel-grad);
      border-radius: 50%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(1.4rem, 6vw, 1.8rem);
      font-weight: 700;
      z-index: 10;
      touch-action: none;
    }

    .dot.start-node {
      background: var(--gray-grad);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.1);
    }

    .dot.selected {
      transform: scale(1.15);
      box-shadow: 0 0 30px rgba(255, 126, 179, 0.8);
    }

    .dot.start-node.selected {
      box-shadow: 0 0 30px rgba(160, 165, 181, 0.8);
    }

    .dot.locked {
      background: var(--surface);
      border: 2px solid #00f2fe;
      color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--surface);
      padding: 45px 30px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      max-width: 320px;
    }

    .modal-title {
      font-size: 2rem;
      background: var(--pastel-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 15px 0;
      letter-spacing: 2px;
      font-weight: 800;
    }

    .modal-text {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 35px;
      line-height: 1.6;
    }
    
    .time-highlight {
      font-size: 2.5rem;
      color: #00ff87;
      font-weight: 900;
      display: block;
      margin: 15px 0;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <svg style="width:0; height:0; position:absolute;" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff7eb3" />
        <stop offset="50%" stop-color="#8b44fc" />
        <stop offset="100%" stop-color="#00d2ff" />
      </linearGradient>
    </defs>
  </svg>

  <div class="top-banner">
    <h2 class="banner-title">
      <img src="icon-512.png" alt="Logo" class="banner-logo">
      GLYPHLO
    </h2>
  </div>

  <div id="screen-intro" class="screen active">
    <img src="icon-512.png" alt="Glyphlo Logo" class="logo" style="width: 140px; height: auto; filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.4));">
    
    <p class="instructions">Minimalism meets motion. Swap the nodes to reveal the hidden pattern, starting from the gray catalyst and reading clockwise.</p>
    <button class="btn" onclick="playSnap(); showScreen('screen-select')">Initiate</button>
  </div>

  <div id="screen-select" class="screen">
    <button class="btn btn-daily" onclick="startDailyChallenge()">
      ⏱️ DAILY CHALLENGE
    </button>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="timer-display" id="timerDisplay">00:00</div>
      <button class="back-btn" onclick="playSnap(); showScreen('screen-select')">⟵</button>
      <div class="header-titles">
        <h1 class="level-text" id="levelDisplay">STAGE 1 / 9</h1>
        <p class="flavor-text" id="flavorDisplay">4 LETTERS</p>
      </div>
      <div class="header-actions">
        <button class="hint-btn" id="defBtn" onclick="playSnap(); showDefinition()" title="Definition">📖</button>
        <button class="hint-btn" id="hintBtn" onclick="useHint()" title="Lock Node">⚡</button>
      </div>
    </div>
    <div class="guess-display" id="guessDisplay"></div> 
    
    <div class="game-board" id="gameBoard">
      <img src="icon-512.png" alt="Center Logo" class="center-logo">
      <div id="puzzleContainer">
        <svg id="wireLayer"></svg>
        <div id="orbLayer"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="milestoneModal">
    <div class="modal-content">
      <h2 class="modal-title">SYNCHRONIZED</h2>
      <p class="modal-text" id="modalText"></p>
      <button class="btn" onclick="playSnap(); closeModal('milestoneModal', 'screen-select')">Proceed</button>
    </div>
  </div>

  <div class="modal-overlay" id="dailyCompleteModal">
    <div class="modal-content">
      <h2 class="modal-title" style="background: var(--daily-grad); -webkit-background-clip: text; color: transparent;">DAILY CLEARED</h2>
      <p class="modal-text">
        Sequence synchronized in:
        <span class="time-highlight" id="dailyTimeText">00:00</span>
      </p>
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn btn-daily" style="margin-bottom: 0;" onclick="shareDaily()">Share Result ➦</button>
        <button class="btn" style="background: var(--surface); color: white; border: 1px solid rgba(255,255,255,0.1);" onclick="playSnap(); closeModal('dailyCompleteModal', 'screen-select')">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="defModal">
    <div class="modal-content">
      <h2 class="modal-title" style="font-size: 1.5rem;">DATA LOG</h2>
      <p class="modal-text" id="defText" style="text-align: left; font-style: italic;">Accessing archives...</p>
      <button class="btn" style="padding: 10px 30px; font-size: 0.9rem;" onclick="playSnap(); closeModal('defModal')">Dismiss</button>
    </div>
  </div>

  <script>
    const baseSnapAudio = new Audio('generic-click.mp3');
    function playSnap() {
      const sound = baseSnapAudio.cloneNode();
      sound.volume = 0.5; 
      sound.play().catch(e => console.log("Audio waiting"));
    }

    // --- GAME STATE ---
    let currentDifficulty = 4;
    let targetWord = "";
    let currentDefinition = "";
    let currentLetters = [];
    let lockedOrbs = [];
    let orbs = [], orbPositions = [];
    let selectedIndex = null, isAnimating = false;
    let activeDragIndex = null, isDragging = false;
    let startPointerX = 0, startPointerY = 0, currentTranslateX = 0, currentTranslateY = 0;

    // --- DAILY CHALLENGE STATE ---
    let isDailyMode = false;
    let dailyStartTime = 0;
    let timerInterval = null;

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const hintBtn = document.getElementById('hintBtn');
    const defBtn = document.getElementById('defBtn');
    const gameBoard = document.getElementById('gameBoard');
    const timerDisplay = document.getElementById('timerDisplay');
    
    function getRequiredStages(letterCount) { return (letterCount - 1) * 3; }
    function getUnlocked() { return parseInt(localStorage.getItem('glyphloUnlocked')) || 4; }
    function setUnlocked(lvl) { localStorage.setItem('glyphloUnlocked', lvl); }
    function getLevelsSolved() { try { return JSON.parse(localStorage.getItem('glyphloLevelsSolved')) || {}; } catch (e) { return {}; } }
    function setLevelsSolved(data) { localStorage.setItem('glyphloLevelsSolved', JSON.stringify(data)); }

    function showScreen(id) {
      if (id !== 'screen-game') {
        clearInterval(timerInterval);
        isDailyMode = false;
      }
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'screen-select') buildLevels();
    }

    function buildLevels() {
      const grid = document.getElementById('levelGrid'), unlocked = getUnlocked();
      grid.innerHTML = '';
      for (let i = 4; i <= 8; i++) { 
        const btn = document.createElement('button');
        btn.className = `level-btn ${i <= unlocked ? 'unlocked' : ''}`;
        btn.innerHTML = `<span>${i} LETTERS</span> <span>${i <= unlocked ? '⟼' : '⊘'}</span>`;
        btn.disabled = i > unlocked;
        btn.onclick = () => { 
          playSnap(); 
          isDailyMode = false;
          currentDifficulty = i; 
          showScreen('screen-game'); 
          startLevel(); 
        };
        grid.appendChild(btn);
      }
    }

    // --- DAILY CHALLENGE LOGIC ---
    function startDailyChallenge() {
      playSnap();
      const today = new Date().toDateString();
      const completedDate = localStorage.getItem('glyphloDailyDate');
      
      if (completedDate === today) {
        const timeLogged = localStorage.getItem('glyphloDailyTime');
        alert(`Synchronized! You already completed today's challenge in ${timeLogged}. Come back tomorrow!`);
        return;
      }

      isDailyMode = true;
      currentDifficulty = 5; 
      dailyStartTime = Date.now();
      timerDisplay.style.display = 'block';
      
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer(); 

      showScreen('screen-game');
      startLevel();
    }

    function updateTimer() {
      if (!isDailyMode) return;
      const elapsed = Math.floor((Date.now() - dailyStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      timerDisplay.textContent = `${m}:${s}`;
    }

    function shareDaily() {
      playSnap();
      const timeStr = localStorage.getItem('glyphloDailyTime');
      
      // Fixed spacing with double newlines so apps won't run it all together
      const shareText = `Glyphlo Daily Challenge ⏱️\n\nI solved the 5, 6, and 7-letter sequence in ${timeStr}!\n\nCan you beat my synchronization time?`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Glyphlo Daily',
          text: shareText
        }).catch(err => console.log('Share canceled or failed', err));
      } else {
        navigator.clipboard.writeText(shareText);
        alert("Result copied to clipboard!");
      }
    }

    async function fetchDefinition(word) {
      currentDefinition = "Searching archives...";
      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        if (!res.ok) throw new Error("Not found");
        const data = await res.json();
        currentDefinition = data[0].meanings[0].definitions[0].definition;
      } catch (e) {
        currentDefinition = "Definition encrypted or unavailable for this sequence.";
      }
    }

    async function fetchWord(len) {
      try {
        const r = await fetch(`https://random-word-api.herokuapp.com/word?length=${len}`);
        const d = await r.json();
        const word = d[0].toUpperCase();
        fetchDefinition(word); 
        return word;
      } catch (e) {
        const fallbacks = {4:"FLOW",5:"GLYPH",6:"SYSTEM",7:"DYNAMIC",8:"STARDUST"};
        const word = fallbacks[len] || "ERROR";
        fetchDefinition(word);
        return word;
      }
    }

    async function startLevel() {
      isAnimating = false; selectedIndex = null; activeDragIndex = null;
      orbLayer.innerHTML = ''; 
      wireLayer.querySelectorAll('polygon').forEach(p => p.remove());
      
      if (isDailyMode) {
        timerDisplay.style.display = 'block';
        levelDisplay.textContent = `DAILY ${currentDifficulty - 4} / 3`;
        flavorDisplay.textContent = `${currentDifficulty} LETTERS`;
        hintBtn.style.display = 'none'; 
      } else {
        timerDisplay.style.display = 'none';
        hintBtn.style.display = 'block';
        const solved = getLevelsSolved()[currentDifficulty] || 0;
        levelDisplay.textContent = `STAGE ${solved + 1} / ${getRequiredStages(currentDifficulty)}`;
        flavorDisplay.textContent = `${currentDifficulty} LETTERS`;
      }

      guessDisplay.textContent = "WAIT...";
      guessDisplay.style.color = "transparent";
      
      targetWord = await fetchWord(currentDifficulty);
      lockedOrbs = new Array(targetWord.length).fill(false);
      
      let scrambled;
      do { scrambled = targetWord.split('').sort(() => 0.5 - Math.random()); } while (scrambled.join('') === targetWord);
      currentLetters = scrambled;

      const size = gameBoard.clientWidth, radius = size * 0.35, cx = size / 2, cy = size / 2;
      const dotSize = Math.max(50, size * 0.15);
      const n = targetWord.length;
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      orbPositions = []; orbs = [];

      for (let i = 0; i < n; i++) {
        const a = (i * 2 * Math.PI) / n - (Math.PI / 2); 
        const px = cx + radius * Math.cos(a), py = cy + radius * Math.sin(a);
        orbPositions.push({ cx: px, cy: py });
        const dot = document.createElement('div');
        
        dot.className = `dot ${i === 0 ? 'start-node' : ''}`;
        dot.style.left = `${px - dotSize / 2}px`; dot.style.top = `${py - dotSize / 2}px`;
        setupInteraction(dot, i);
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }
      poly.setAttribute('fill', 'none'); 
      poly.setAttribute('stroke', 'url(#lineGrad)'); 
      poly.setAttribute('stroke-width', '3');
      wireLayer.appendChild(poly);
      updateWires(); render();
    }

    function showDefinition() {
      if (isAnimating) return;
      document.getElementById('defText').textContent = `"${currentDefinition}"`;
      document.getElementById('defModal').classList.add('active');
    }

    function useHint() {
      if (isAnimating || isDailyMode) return;
      playSnap(); 
      let wrongIndices = [];
      for (let i = 0; i < targetWord.length; i++) { if (!lockedOrbs[i] && currentLetters[i] !== targetWord[i]) { wrongIndices.push(i); } }
      if (wrongIndices.length <= 2) return;
      const targetIdx = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
      const needed = targetWord[targetIdx];
      let srcIdx = -1;
      for (let i = 0; i < currentLetters.length; i++) { if (!lockedOrbs[i] && currentLetters[i] === needed && i !== targetIdx) { srcIdx = i; break; } }
      if (srcIdx !== -1) [currentLetters[targetIdx], currentLetters[srcIdx]] = [currentLetters[srcIdx], currentLetters[targetIdx]];
      lockedOrbs[targetIdx] = true; selectedIndex = null; render(); checkWinCondition();
    }

    function updateWires(di = -1, dx = 0, dy = 0) {
      let pts = "";
      orbPositions.forEach((p, i) => { pts += `${i === di ? p.cx + dx : p.cx},${i === di ? p.cy + dy : p.cy} `; });
      const p = wireLayer.querySelector('polygon');
      if (p) p.setAttribute('points', pts.trim());
    }

    function setupInteraction(dot, i) {
      dot.addEventListener('pointerdown', e => {
        if (isAnimating || lockedOrbs[i]) return;
        activeDragIndex = i; isDragging = false;
        startPointerX = e.clientX; startPointerY = e.clientY;
        dot.style.transition = 'none'; dot.style.zIndex = 100;
        dot.setPointerCapture(e.pointerId);
      });
      dot.addEventListener('pointermove', e => {
        if (activeDragIndex !== i) return;
        const dx = e.clientX - startPointerX, dy = e.clientY - startPointerY;
        if (!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) { isDragging = true; selectedIndex = null; render(); }
        if (isDragging) { dot.style.transform = `translate(${dx}px, ${dy}px) scale(1.15)`; currentTranslateX = dx; currentTranslateY = dy; updateWires(i, dx, dy); }
      });
      dot.addEventListener('pointerup', e => {
        if (activeDragIndex !== i) return;
        dot.releasePointerCapture(e.pointerId); activeDragIndex = null;
        dot.style.transition = 'all 0.2s'; dot.style.transform = ''; dot.style.zIndex = 10;
        if (!isDragging) handleTap(i); else handleDrop(i, currentTranslateX, currentTranslateY);
        updateWires(); isDragging = false;
      });
    }

    function handleTap(idx) {
      if (lockedOrbs[idx]) return;
      playSnap(); 
      if (selectedIndex === null) selectedIndex = idx;
      else if (selectedIndex === idx) selectedIndex = null;
      else { 
        [currentLetters[selectedIndex], currentLetters[idx]] = [currentLetters[idx], currentLetters[selectedIndex]]; 
        selectedIndex = null; 
        checkWinCondition(); 
      }
      render();
    }

    function handleDrop(di, dx, dy) {
      const dropX = orbPositions[di].cx + dx, dropY = orbPositions[di].cy + dy;
      let closest = -1, min = 55;
      orbPositions.forEach((p, i) => { if (i !== di && !lockedOrbs[i]) { const d = Math.hypot(dropX - p.cx, dropY - p.cy); if (d < min) { min = d; closest = i; } } });
      
      if (closest !== -1) { 
        playSnap(); 
        [currentLetters[di], currentLetters[closest]] = [currentLetters[closest], currentLetters[di]]; 
        checkWinCondition(); 
      }
      render();
    }

    function render() {
      orbs.forEach((d, i) => { 
        d.textContent = currentLetters[i]; 
        let classes = 'dot';
        if (i === 0) classes += ' start-node';
        if (lockedOrbs[i]) classes += ' locked';
        if (i === selectedIndex) classes += ' selected';
        d.className = classes; 
      });
      guessDisplay.textContent = currentLetters.join('');
      let wrongIndices = [];
      for (let i = 0; i < targetWord.length; i++) { if (!lockedOrbs[i] && currentLetters[i] !== targetWord[i]) { wrongIndices.push(i); } }
      hintBtn.disabled = wrongIndices.length <= 2;
    }

    function checkWinCondition() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        guessDisplay.style.color = "var(--success)";
        guessDisplay.style.background = "none";
        guessDisplay.style.webkitBackgroundClip = "border-box";
        
        const poly = wireLayer.querySelector('polygon');
        if (poly) poly.setAttribute('stroke', 'var(--success)');
        
        orbs.forEach(d => { 
          d.className = 'dot';
          d.style.background = "var(--success)"; 
          d.style.boxShadow = "0 0 30px rgba(0, 242, 254, 0.6)"; 
          d.style.border = "none"; 
          d.style.color = "#08080c"; 
        });
        
        setTimeout(() => {
          puzzleContainer.classList.add('solved');
          setTimeout(() => {
            puzzleContainer.classList.remove('solved');
            guessDisplay.style.color = "transparent";
            guessDisplay.style.background = "var(--pastel-grad)";
            guessDisplay.style.webkitBackgroundClip = "text";
            handleWinProgression();
          }, 1000);
        }, 800);
      }
    }

    function handleWinProgression() {
      if (isDailyMode) {
        currentDifficulty++;
        if (currentDifficulty > 7) {
          clearInterval(timerInterval);
          isDailyMode = false;
          
          const finalTimeStr = timerDisplay.textContent;
          document.getElementById('dailyTimeText').textContent = finalTimeStr;
          
          localStorage.setItem('glyphloDailyDate', new Date().toDateString());
          localStorage.setItem('glyphloDailyTime', finalTimeStr);
          
          document.getElementById('dailyCompleteModal').classList.add('active');
        } else {
          startLevel();
        }
      } else {
        let data = getLevelsSolved();
        let currentSolved = data[currentDifficulty] || 0;
        currentSolved++;
        data[currentDifficulty] = currentSolved;
        setLevelsSolved(data);
        
        const required = getRequiredStages(currentDifficulty);
        if (currentSolved >= required) {
          if (currentDifficulty >= getUnlocked()) setUnlocked(currentDifficulty + 1);
          document.getElementById('modalText').textContent = `Pattern complete. System upgraded to ${currentDifficulty + 1} letter sequence.`;
          document.getElementById('milestoneModal').classList.add('active');
          buildLevels();
        } else {
          startLevel();
        }
      }
    }

    function closeModal(modalId, nextScreenId = null) { 
      document.getElementById(modalId).classList.remove('active'); 
      if(nextScreenId) showScreen(nextScreenId); 
    }
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('ServiceWorker registered'))
          .catch(err => console.log('ServiceWorker failed: ', err));
      });
    }
    
    buildLevels();
  </script>
</body>
